<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mycatur Game V2</title>
  <link rel="icon" type="image/svg+xml" href="./assets/icons/bishop.svg" />
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2f;
      --panel-2: #1d2340;
      --text: #eef2ff;
      --muted: #aab4d6;
      --accent: #6ea8fe;
      --light-square: #f0d9b5;
      --dark-square: #b58863;
      --highlight: rgba(110, 168, 254, 0.35);
      --ok: #73e2a7;
      --warn: #fbbf24;
      --danger: #ff7b7b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #171b2f 0%, #0f1220 60%);
      color: var(--text);
    }

    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 300px 1fr 380px;
      gap: 24px;
      min-height: 100vh;
    }

    .panel {
      background: rgba(23, 27, 47, 0.95);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .side-panel, .sidebar {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .board-wrap {
      padding: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .board-stage {
      width: min(80vw, 760px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .board-banner {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
    }

    .board-banner.show {
      display: block;
    }

    .board-banner.checkmate {
      background: rgba(255, 123, 123, 0.16);
      border-color: rgba(255, 123, 123, 0.35);
    }

    .board-banner.draw {
      background: rgba(251, 191, 36, 0.16);
      border-color: rgba(251, 191, 36, 0.35);
    }

    .board-banner.replay {
      background: rgba(110, 168, 254, 0.16);
      border-color: rgba(110, 168, 254, 0.35);
    }

    .board-banner-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .board-banner-subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .board {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border-radius: 14px;
      overflow: hidden;
      margin: 0 auto;
      border: 2px solid rgba(255,255,255,0.1);
      background: #0f1220;
    }

    .square {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      aspect-ratio: 1 / 1;
      font-size: clamp(24px, 4vw, 48px);
      user-select: none;
      cursor: pointer;
      border: none;
      padding: 0;
      border-radius: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    .square.light { background: var(--light-square); }
    .square.dark { background: var(--dark-square); }
    .square.selected::after,
    .square.target::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--highlight);
    }

    .piece {
      position: relative;
      z-index: 1;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.25);
    }

    .piece.white-piece { color: #ffffff; }
    .piece.black-piece { color: #000000; }

    .section {
      background: var(--panel-2);
      border-radius: 14px;
      padding: 16px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 26px; margin-bottom: 8px; }
    h2 { font-size: 16px; margin-bottom: 10px; }
    h3 { font-size: 13px; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .muted { color: var(--muted); }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .inline-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button, select, input {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }

    button {
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button.secondary {
      background: rgba(255,255,255,0.09);
      color: var(--text);
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    select, input {
      width: 100%;
      background: #fff;
      color: #111;
    }

    .status-line {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .list, .log {
      max-height: 320px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
    }

    .log { max-height: 240px; }

    .item, .log-entry {
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    .item-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(115, 226, 167, 0.14);
      color: var(--ok);
    }

    .badge.warn {
      background: rgba(251, 191, 36, 0.14);
      color: var(--warn);
    }

    .error {
      color: var(--danger);
      font-size: 13px;
    }

    @media (max-width: 1200px) {
      .app {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 10px;
        gap: 12px;
      }

      .board-wrap,
      .side-panel,
      .sidebar,
      .section {
        padding: 12px;
      }

      .board-stage {
        width: min(100%, calc(100vw - 24px));
      }

      .board,
      .board-banner {
        width: 100%;
        border-radius: 12px;
      }

      .square {
        font-size: clamp(18px, 7vw, 38px);
      }

      h1 {
        font-size: 22px;
      }

      button, select, input {
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel side-panel">
      <div>
        <h1>Mycatur V2</h1>
        <p class="muted">Single-user normal chess with persistence and history.</p>
      </div>

      <div class="section">
        <h2>Account</h2>
        <div id="authState"></div>
        <div id="loginForm" class="controls">
          <input id="usernameInput" type="text" placeholder="Username" autocomplete="username" />
          <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" />
          <button id="loginButton">Login</button>
          <div id="loginError" class="error"></div>
        </div>
        <div id="userPanel" style="display:none;">
          <div id="currentUser" class="status-line"></div>
          <div class="inline-actions">
            <button id="logoutButton" class="secondary">Logout</button>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Sessions</h2>
        <div id="sessionCreateArea" class="controls" style="display:none;">
          <select id="newSessionModeSelect">
            <option value="human-vs-human">Human vs Human</option>
            <option value="human-vs-ai">Human vs AI</option>
          </select>
          <select id="newSessionSideSelect">
            <option value="white">Play as White</option>
            <option value="black">Play as Black</option>
          </select>
          <input id="newSessionNameInput" type="text" placeholder="Optional session name" />
          <label class="item-meta"><input id="newSessionSpecializedToggle" type="checkbox" style="width:auto; margin-right:8px;" /> Specialized ruleset</label>
          <button id="newSessionButton">Create New Session</button>
        </div>
        <div id="sessionCreateHint" class="item-meta">Log in to create and save sessions.</div>
        <div id="sessionList" class="list" style="margin-top:12px;"></div>
      </div>
    </div>

    <div class="panel board-wrap">
      <div class="board-stage">
        <div id="boardBanner" class="board-banner">
          <div id="boardBannerTitle" class="board-banner-title"></div>
          <div id="boardBannerSubtitle" class="board-banner-subtitle"></div>
        </div>
        <div id="board" class="board"></div>
      </div>
    </div>

    <div class="panel sidebar">
      <div class="section">
        <h2>Game Controls</h2>
        <div class="controls">
          <select id="modeSelect">
            <option value="human-vs-human">Human vs Human</option>
            <option value="human-vs-ai">Human vs AI</option>
          </select>
          <div class="controls">
            <label class="item-meta"><input id="rulesetNormalToggle" name="rulesetMode" type="radio" style="width:auto; margin-right:8px;" checked /> Normal ruleset</label>
            <label class="item-meta"><input id="rulesetSpecializedToggle" name="rulesetMode" type="radio" style="width:auto; margin-right:8px;" /> Specialized ruleset</label>
            <label class="item-meta"><input id="rulesetSandboxToggle" name="rulesetMode" type="radio" style="width:auto; margin-right:8px;" /> Sandbox mode</label>
          </div>
          <select id="playerColorSelect">
            <option value="white">Play as White</option>
            <option value="black">Play as Black</option>
          </select>
          <button id="startButton">Start Game</button>
          <button id="resetButton" class="secondary">Reset Local Board</button>
        </div>
      </div>

      
      <div class="section">
        <h2>Specialized Setup</h2>
        <div id="specializedSetup" class="controls"></div>
      </div>

      <div id="sandboxSection" class="section" style="display:none;">
        <h2>Sandbox Controls</h2>
        <div id="sandboxStatus" class="item-meta" style="margin-bottom:10px;"></div>
        <div class="controls">
          <select id="sandboxSummonColor">
            <option value="white">White</option>
            <option value="black">Black</option>
          </select>
          <select id="sandboxSummonType"></select>
          <div class="inline-actions">
            <button id="sandboxSummonButton">Summon to selected square</button>
            <button id="sandboxDeleteButton" class="danger">Delete selected piece</button>
            <button id="sandboxUndoButton" class="secondary">Undo</button>
          </div>
          <div class="inline-actions">
            <button id="sandboxAskAiWhiteButton" class="secondary">Ask AI White</button>
            <button id="sandboxAskAiBlackButton" class="secondary">Ask AI Black</button>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Status</h2>
        <div id="status" class="status-line"></div>
        <div style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap;">
          <span class="badge">Persistence enabled</span>
          <span class="badge warn">Stockfish later</span>
        </div>
      </div>

      <div class="section">
        <h2>Move Log</h2>
        <div id="moveLog" class="log"></div>
      </div>

      <div class="section">
        <h2>Replay</h2>
        <div class="inline-controls">
          <button id="replayStartButton" class="secondary">|&lt;</button>
          <button id="replayPrevButton" class="secondary">&lt;</button>
          <button id="replayNextButton" class="secondary">&gt;</button>
          <button id="replayEndButton" class="secondary">Back to Live</button>
        </div>
        <div id="replayStatus" class="status-line" style="margin-top:10px;"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
