services:
  db:
    image: postgres:16-alpine
    container_name: mycatur-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mycatur-postgres-data:/var/lib/postgresql/data
      - ./server/db/init:/docker-entrypoint-initdb.d:ro

  mycatur:
    build: .
    container_name: mycatur
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "127.0.0.1:8090:3000"

volumes:
  mycatur-postgres-data:
